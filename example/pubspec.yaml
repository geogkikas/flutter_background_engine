name: background_data_fetcher_example
description: "Demonstrates how to use the background_data_fetcher plugin."
publish_to: 'none'

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  background_data_fetcher:
    path: ../

  device_context:
    git:
      url: https://github.com/geogkikas/device_context.git
      ref: main

  intl: ^0.20.2
  flutter_riverpod: ^3.3.1
  permission_handler: ^12.0.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true